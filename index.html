<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Instagram</title>
</head>

<body>


  <style>
    @import url('https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
    }

    .ig-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 580px;
      padding: 2rem 1rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .ig-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 350px;
    }

    .ig-card {
      background: #fff;
      border: 1px solid #dbdbdb;
      border-radius: 3px;
      padding: 36px 40px 24px;
      width: 100%;
    }

    .ig-logo {
      font-family: 'Grand Hotel', cursive, serif;
      font-size: 40px;
      background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 24px;
      display: block;
    }

    .ig-input {
      width: 100%;
      background: #fafafa;
      border: 1px solid #dbdbdb;
      border-radius: 3px;
      padding: 9px 8px 7px;
      font-size: 12px;
      color: #262626;
      outline: none;
      margin-bottom: 6px;
      transition: border 0.15s;
    }

    .ig-input:focus {
      border-color: #a8a8a8;
      background: #fff;
    }

    .ig-input::placeholder {
      color: #999;
      font-size: 12px;
    }

    .ig-btn {
      width: 100%;
      background: #0095f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .ig-btn:hover {
      opacity: 0.85;
    }

    .ig-btn:active {
      opacity: 0.7;
    }

    .or-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0 12px;
    }

    .or-line {
      flex: 1;
      height: 1px;
      background: #dbdbdb;
    }

    .or-text {
      font-size: 13px;
      font-weight: 600;
      color: #737373;
    }

    .fb-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #385185;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      padding: 8px;
    }

    .fb-btn:hover {
      opacity: 0.75;
    }

    .fb-icon {
      width: 20px;
      height: 20px;
    }

    .forgot {
      display: block;
      text-align: center;
      font-size: 12px;
      color: #00376b;
      margin-top: 14px;
      cursor: pointer;
    }

    .ig-signup-card {
      background: #fff;
      border: 1px solid #dbdbdb;
      border-radius: 3px;
      padding: 18px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #262626;
    }

    .ig-signup-card a {
      color: #0095f6;
      font-weight: 600;
      cursor: pointer;
    }

    .ig-app {
      text-align: center;
      font-size: 13px;
      color: #262626;
      margin-top: 10px;
    }

    .ig-app p {
      margin-bottom: 10px;
    }

    .store-row {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .store-btn {
      border: 1px solid #262626;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #262626;
      cursor: pointer;
      background: none;
    }

    .store-btn:hover {
      background: #f0f0f0;
    }

    .ig-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
      z-index: 99;
    }

    .ig-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>

        <input class="ig-input" type="text" id="ig-user" placeholder="Telefon raqami, foydalanuvchi nomi yoki email" />
        <div style="position:relative;">
          <input class="ig-input" type="password" id="ig-pass" placeholder="Parol" style="padding-right: 52px;" />
          <button onclick="togglePass()"
            style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:13px;font-weight:600;color:#262626;cursor:pointer;"
            id="show-btn">Ko'rish</button>
        </div>

      </div>

      <div class="ig-signup-card">
        Akkauntingiz yo'qmi? <a onclick="showToast('Ro\'yxatdan o\'tish sahifasiga o\'tildi')">Ro'yxatdan o'ting</a>
      </div>

      <div class="ig-app">
        <p style="color:#262626; font-size:13px;">Ilovani yuklab oling</p>
        <div class="store-row">
          <button class="store-btn" onclick="showToast('App Store ga yo\'naltirilmoqda')">
            <i class="fa-brands fa-app-store-ios"></i>
            App Store
          </button>
          <button class="store-btn" onclick="showToast('Google Play ga yo\'naltirilmoqda')">

            Google Play

        </div>
      </div>
    </div>

  <div class="ig-toast" id="toast"></div>

  <script src="./main.js"></script>


</body>

</html>
